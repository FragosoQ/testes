<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOMENGIL · PM1</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cyan:  #00d4ff;
  --green: #00ff87;
  --amber: #ffaa00;
  --red:   #ff3b3b;
  --bg:    #03060d;

  /* Alturas de referência — centralizam os números mágicos */
  --header-h: clamp(52px, 6vh, 70px);
  --footer-h: clamp(46px, 5.5vh, 60px);
  --side-pad: clamp(20px, 3vw, 48px);
}

html, body {
  width: 100%; height: 100%;
  background: radial-gradient(circle at center, rgba(81,184,234,1) 0%, rgba(0,0,0,1) 100%);
  background-attachment: fixed;
  color: #fff;
  font-family: 'Barlow Condensed', sans-serif;
  overflow-x: hidden;
  overflow-y: auto;
}

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
.shell {
  display: grid;
  grid-template-rows: var(--header-h) 1fr var(--footer-h);
  height: 100vh;
  height: 100dvh; /* usa dvh quando disponível para evitar saltos em mobile */
  position: relative;
  min-height: 0;
}

/* ══════════════════════════════════════
   BACKGROUND TEXTURE
══════════════════════════════════════ */
.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

.bg-glow-left {
  position: fixed;
  left: -200px; top: 20%;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.bg-glow-right {
  position: fixed;
  right: -100px; bottom: 10%;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(0,80,120,0.15) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
header {
  position: relative; z-index: 2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--side-pad);
  background: rgba(0,20,40,0.35);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.15);
  min-height: 0;
}

.h-logo {
  display: flex; align-items: center; gap: 14px;
}
.h-logo img { height: clamp(26px, 4vh, 36px); width: auto; display: block; }

.h-brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(24px, 3vh, 36px);
  letter-spacing: 6px; color: #fff;
  text-shadow: 0 0 30px rgba(255,255,255,0.3);
}

.h-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: clamp(10px, 1.5vw, 20px);
}

.h-badge {
  font-size: clamp(12px, 1.6vh, 16px); font-weight: 700; letter-spacing: 4px;
  text-transform: uppercase; color: rgba(255,255,255,0.75);
  white-space: nowrap;
}

.h-sep { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.4); flex-shrink: 0; }

.h-op {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(18px, 2.6vh, 26px); letter-spacing: 3px; color: #fff;
  text-shadow: 0 0 20px rgba(255,255,255,0.5);
  white-space: nowrap;
}

.h-time {
  font-size: clamp(14px, 2vh, 20px); letter-spacing: 2px; color: rgba(255,255,255,0.85);
  white-space: nowrap;
}

.h-priority {
  position: absolute;
  top: clamp(8px, 1.4vh, 14px);
  right: clamp(10px, 1.5vw, 18px);
  z-index: 3;
  display: flex; flex-direction: column; align-items: flex-end;
  line-height: 1.05;
  padding: 4px 10px;
  border-left: 2px solid rgba(255, 255, 255, 0.5);
  border-right: 2px solid rgba(255, 255, 255, 0.5);
  background: rgba(255, 255, 255, 0.05);
}
.h-priority-label {
  font-size: clamp(9px, 1.2vh, 12px);
  font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.85);
  margin-bottom: 1.5em; /* Isto cria o espaço de "um parágrafo" entre os dois */
}
.h-priority-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(14px, 2.2vh, 22px);
  letter-spacing: 2px;
  color: #fff;
  text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
  white-space: nowrap;
}
.h-priority.is-empty .h-priority-value {
  color: rgba(255,255,255,0.4);
  text-shadow: none;
}

/* Variante esquerda: posicionada no canto superior esquerdo */
.h-priority-left {
  right: auto;
  left: clamp(10px, 1.5vw, 18px);
  align-items: center;
}

/* ══════════════════════════════════════
   MAIN
══════════════════════════════════════ */
main {
  position: relative; z-index: 2;
  display: grid;
  grid-template-columns: 1fr clamp(340px, 32vw, 475px);
  gap: 0;
  overflow: hidden;
  min-height: 0;
  min-width: 0;
}

/* ══════════════════════════════════════
   LEFT PANEL
   Mudança principal: em vez de 1.2fr / 1px / 0.8fr (que pode esmagar zonas),
   as zonas recebem auto (pelo conteúdo) e o hero recebe 1fr (enche o resto).
   Assim, quando a altura encolhe, é o hero que encolhe primeiro — e nunca as zonas.
══════════════════════════════════════ */
.left {
  display: grid;
  grid-template-rows: minmax(0, 1fr) 1px auto;
  border-right: 1px solid rgba(255,255,255,0.12);
  min-height: 0;
  min-width: 0;
}

.divider-h { background: rgba(255,255,255,0.1); }

/* TOP LEFT — HERO */
.hero {
  display: grid;
  grid-template-columns: 1fr 1fr;
  overflow: hidden;
  min-height: 0;
}

.hero-evolucao {
  padding: clamp(16px, 3vh, 32px) clamp(20px, 3vw, 40px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  border-right: 1px solid rgba(255,255,255,0.08);
  position: relative;
  overflow: visible;
  background: rgba(0,20,50,0.2);
  min-height: 0;
  min-width: 0;
}

.hero-evolucao::before {
  content: '';
  position: absolute;
  left: -20px; top: -20px;
  width: 200px; height: 200px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.08);
}
.hero-evolucao::after {
  content: '';
  position: absolute;
  left: -60px; top: -60px;
  width: 320px; height: 320px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.04);
}

.ev-label {
  font-size: 16px; font-weight: 700; letter-spacing: 5px;
  text-transform: uppercase; color: rgba(255,255,255,0.75);
  margin-bottom: 8px; position: relative; z-index: 1;
}

.ev-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(120px, 15vw, 200px);
  line-height: .85;
  letter-spacing: -2px;
  position: relative; z-index: 1;
}

.ev-sub {
  font-size: 18px; letter-spacing: 4px;
  color: rgba(255,255,255,0.75);
  text-transform: uppercase;
  margin-top: 12px; position: relative; z-index: 1;
}

/* HERO RIGHT — IDENTIDADE
   Fontes reduzidas e fluidas para poupar altura vertical.
*/
.hero-id {
  padding: clamp(16px, 3vh, 32px) clamp(20px, 3vw, 40px);
  display: flex; flex-direction: column; justify-content: center;
  gap: 0;
  background: rgba(0,10,30,0.15);
  min-height: 0;
  min-width: 0;
  overflow: hidden;
}

.id-modelo-label,
.id-cliente-label {
  font-size: clamp(18px, 2.4vh, 32px);
  font-weight: 700; letter-spacing: 5px;
  text-transform: uppercase; color: rgba(255,255,255,0.7);
  margin-bottom: clamp(4px, 0.8vh, 10px);
}

.id-modelo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(42px, 5.5vw, 92px);
  letter-spacing: 2px; color: #fff;
  line-height: 1;
  margin-bottom: clamp(4px, 0.8vh, 8px);
}

.id-lote {
  font-size: clamp(22px, 3.6vh, 46px);
  color: rgba(255,255,255,0.8);
  letter-spacing: 1px;
  margin-bottom: clamp(14px, 3vh, 36px);
}

.id-cliente {
  font-size: clamp(21.42px, 2.45vw, 48.96px);
  font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  color: #fff; line-height: 1.1;
  margin-bottom: clamp(4px, 0.8vh, 10px);
}

.id-pais {
  display: flex; align-items: center; gap: clamp(8px, 1vw, 14px);
}
.id-flag {
  font-size: clamp(32px, 5vh, 64px);
  line-height: 1;
}
.id-pais-info {
  font-size: clamp(20px, 3.2vh, 44px);
  letter-spacing: 2px;
  color: rgba(255,255,255,0.8); text-transform: uppercase;
}

/* Modo grid 2x2 quando há mais do que um país */
.id-pais.is-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(6px, 1vh, 12px) clamp(14px, 2vw, 28px);
  align-items: center;
}
.id-pais-cell {
  display: flex;
  align-items: center;
  gap: clamp(6px, 0.8vw, 10px);
  min-width: 0;
}
.id-pais-cell .id-flag {
  font-size: clamp(24px, 3.6vh, 43px);
  flex-shrink: 0;
}
.id-pais-cell .id-pais-info {
  font-size: clamp(17px, 2.4vh, 29px);
  letter-spacing: 1.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* BOTTOM LEFT — ZONAS
   Paddings e fontes agora fluidos para garantir que cabem sempre.
*/
.zonas-panel {
  padding: clamp(14px, 2.4vh, 28px) clamp(20px, 3vw, 40px);
  display: flex; flex-direction: column; gap: 0;
  background: rgba(0,15,40,0.2);
  min-height: 0;
  min-width: 0;
}

.zonas-title {
  font-size: clamp(16px, 2.2vh, 22px);
  font-weight: 700; letter-spacing: 5px;
  text-transform: uppercase; color: rgba(255,255,255,0.75);
  margin-bottom: clamp(10px, 1.6vh, 16px);
}

.zonas-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 1fr;
  gap: clamp(10px, 1.6vh, 16px) clamp(14px, 2vw, 24px);
  flex: 1;
  min-height: 0;
}

.zona-card {
  display: flex; flex-direction: column;
  gap: clamp(4px, 0.8vh, 8px);
  padding: clamp(10px, 1.6vh, 16px) clamp(12px, 1.4vw, 18px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(8px);
  position: relative;
  overflow: hidden;
  transition: border-color .3s, background .3s;
  min-width: 0;
}

.zona-card.done  { border-color: rgba(0,255,135,0.4);  background: rgba(0,255,135,0.08); }
.zona-card.going { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.1); }
.zona-card.empty { border-color: rgba(255,255,255,0.06); background: rgba(0,0,0,0.15); }

/* Card que ocupa 2 linhas do grid (ex: Planeamento, Testes) */
.zona-card.tall { grid-row: span 2; }

.zona-card-label {
  font-size: clamp(14px, 1.8vh, 22px);
  font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: rgba(255,255,255,0.75);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.zona-card.done  .zona-card-label { color: #00ff87; }
.zona-card.going .zona-card-label { color: #fff; }
.zona-card.empty .zona-card-label { color: rgba(255,255,255,0.4); }

.zona-card-pct {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(38px, 6vh, 72px);
  line-height: 1; letter-spacing: 1px;
}

.zona-card-bar {
  height: clamp(6px, 1vh, 10px);
  background: rgba(255,255,255,0.12);
  border-radius: 5px; overflow: hidden;
}
.zona-card-fill { height: 100%; border-radius: 5px; }

/* Variante: card em modo lista (ex: Área Técnica → últimos lotes em soldadura) */
.zona-card.list {
  gap: clamp(2px, 0.4vh, 4px);
  justify-content: flex-start;
}
.zona-card.list .zona-card-label {
  margin-bottom: clamp(2px, 0.4vh, 4px);
}
.zona-card-list-header {
  font-size: clamp(10px, 1.2vh, 12px);
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  padding-bottom: clamp(2px, 0.4vh, 4px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.zona-card-list-items {
  display: flex;
  flex-direction: column;
  gap: clamp(1px, 0.3vh, 3px);
  flex: 1;
  min-height: 0;
  overflow: hidden;
}
.zona-card-list-item {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: calc(clamp(13px, 1.7vh, 18px) * 1.1);
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  letter-spacing: 0.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.25;
}
.zona-card-list-empty {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(12px, 1.5vh, 16px);
  color: rgba(255,255,255,0.35);
  font-style: italic;
}

/* Variante: card com um único valor centrado (ex: Próxima Prioridade) */
.zona-card.single {
  justify-content: space-between;
}
.zona-card-single-value {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(28px, 5vh, 56px);
  letter-spacing: 1px;
  color: #fff;
  text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
  line-height: 1;
  padding: 0 4px;
  min-height: 0;
  text-align: center;
  word-break: break-word;
}
.zona-card.single.empty .zona-card-single-value {
  color: rgba(255,255,255,0.35);
  text-shadow: none;
  font-size: clamp(20px, 3vh, 32px);
}

/* ══════════════════════════════════════
   RIGHT PANEL
══════════════════════════════════════ */
.right {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: rgba(0,10,30,0.25);
  backdrop-filter: blur(4px);
  min-height: 0;
  min-width: 0;
}

/* GLOBO / EVOLUÇÃO */
.globe-section {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  overflow: hidden;
  min-height: 0;
  padding: clamp(10px, 1.5vh, 20px) 0;
}

/* PRAZO */
.prazo-section {
  padding: clamp(14px, 2.2vh, 24px) clamp(18px, 2vw, 28px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 0;
}

.prazo-top {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: clamp(8px, 1.2vh, 12px);
  gap: 10px;
}

.prazo-label {
  font-size: clamp(13px, 1.6vh, 16px);
  font-weight: 700; letter-spacing: 5px;
  text-transform: uppercase; color: rgba(255,255,255,0.75);
}

.prazo-folga {
  font-size: clamp(14px, 1.8vh, 18px);
  letter-spacing: 2px;
  text-transform: uppercase;
  text-align: right;
}

.prazo-numbers {
  display: flex; align-items: baseline; gap: 6px;
  margin-bottom: clamp(10px, 1.4vh, 14px);
}
.prazo-used {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(52px, 8vh, 80px);
  line-height: .9; letter-spacing: -1px;
}
.prazo-div { font-size: clamp(24px, 3.6vh, 36px); color: rgba(255,255,255,0.4); font-weight: 300; }
.prazo-total { font-size: clamp(32px, 4.8vh, 48px); color: #fff; font-weight: 300; letter-spacing: -1px; }
.prazo-unit { font-size: clamp(14px, 1.8vh, 18px); letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.75); align-self: flex-end; padding-bottom: clamp(6px, 1vh, 10px); }

.prazo-track {
  height: clamp(8px, 1.2vh, 12px);
  background: rgba(255,255,255,0.12);
  border-radius: 6px; overflow: hidden;
}
.prazo-fill-bar {
  height: 100%;
  border-radius: 6px;
  position: relative;
  overflow: hidden;
}
.prazo-fill-bar::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 50%;
  background: rgba(255,255,255,0.2);
  border-radius: 6px 6px 0 0;
}

/* DETALHES */
.details-section {
  padding: clamp(12px, 1.8vh, 20px) clamp(18px, 2vw, 28px);
  display: flex; flex-direction: column;
  justify-content: center;
  align-items: stretch;
  gap: 0;
  min-height: 0;
}
/* Agrupa os rows e mantém-nos coladinhos, centrados em bloco */
.details-inner {
  display: flex; flex-direction: column;
  width: 100%;
}

.detail-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: clamp(6px, 1vh, 9px) 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.detail-row:last-child { border-bottom: none; }

.d-k {
  font-size: clamp(11px, 1.4vh, 14px);
  font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: rgba(255,255,255,0.7);
}
.d-v {
  font-size: clamp(16px, 2vh, 20px);
  font-weight: 700;
  color: #fff; letter-spacing: .5px;
}

/* ══════════════════════════════════════
   FOOTER
══════════════════════════════════════ */
footer {
  position: relative; z-index: 2;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 var(--side-pad);
  background: rgba(0,20,40,0.35);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(255,255,255,0.12);
  min-height: 0;
  gap: 10px;
}

.f-left { display: flex; align-items: center; gap: clamp(8px, 1vw, 16px); min-width: 0; }
.f-dot  { width: 12px; height: 12px; border-radius: 50%; background: var(--green); box-shadow: 0 0 12px var(--green); flex-shrink: 0; }
.f-status { font-size: clamp(12px, 1.6vh, 16px); font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--green); white-space: nowrap; }
.f-op-label { font-size: clamp(11px, 1.4vh, 14px); letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.75); white-space: nowrap; }
.f-op { font-size: clamp(16px, 2vh, 22px); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #fff; white-space: nowrap; }

.f-right { text-align: right; flex-shrink: 0; }
.f-date  { font-size: clamp(13px, 1.8vh, 18px); letter-spacing: 2px; color: rgba(255,255,255,0.85); white-space: nowrap; }

/* ══════════════════════════════════════
   TOP ACCENT
══════════════════════════════════════ */
.top-accent {
  position: fixed; top: 0; left: 0; right: 0; height: 2px; z-index: 100;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6) 30%, rgba(255,255,255,0.6) 70%, transparent);
}

/* ══════════════════════════════════════
   MEDIA QUERIES — ajuste em ecrãs baixos
   Quando a altura da viewport é pequena (típico em 13" touchscreen
   industrial), encolhemos ainda mais o hero-id e damos prioridade às zonas.
══════════════════════════════════════ */
@media (max-height: 820px) {
  .hero-id { padding-top: 14px; padding-bottom: 14px; }
  .id-lote { margin-bottom: 14px; }
  .id-cliente-label { margin-top: 0 !important; }
}

@media (max-height: 720px) {
  /* Em ecrãs muito baixos, esconde decorações laterais do globo para poupar GPU */
  .hero-evolucao::before,
  .hero-evolucao::after { display: none; }

  /* Labels de ID mais compactas */
  .id-modelo-label,
  .id-cliente-label { letter-spacing: 3px; }

  /* Centraliza o hero-id verticalmente para aproveitar espaço */
  .hero-id { gap: 0; }
}

@media (max-height: 620px) {
  /* Em alturas críticas, o hero-id passa de 2 blocos (modelo + cliente)
     para layout mais apertado e o globo fica um pouco mais pequeno. */
  .id-lote { margin-bottom: 8px; }
  .zonas-grid { gap: 8px 12px; }
  .zona-card { padding: 8px 12px; }
  .zona-card-pct { font-size: clamp(32px, 5vh, 48px); }
}

/* Ecrãs estreitos — empilha painéis (útil se a unidade rodar em portrait) */
@media (max-width: 900px) {
  html, body {
    min-width: 0;
  }

  .shell {
    width: 100%;
    max-width: 100%;

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const SHEET_CONFIG_DEFAULT = {
  id: '1GQUB52a2gKR429bjqJrNkbP5rjR7Z_4v85z9M7_Cr8Y',
  tab: 'PM1',
  keyHeader: null,
  keyValue: null,
  targetHeader: 'EVOLUÇÃO',
  targetColumn: 'Y',
};

// Cache system to avoid multiple fetches
let sheetCache = {};
let sheetCachePromises = {};

function getCacheKey(config) {
  const cfg = Object.assign({}, SHEET_CONFIG_DEFAULT, config);
  return `${cfg.id}|${cfg.tab}`;
}

function getSheetEndpoint(config) {
  const sheetId = encodeURIComponent(config.id);
  const sheetTab = encodeURIComponent(config.tab);
  return `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${sheetTab}&headers=1`;
}

function parseGvizResponse(text) {
  const match = text.match(/google\.visualization\.Query\.setResponse\((.*)\);?$/s);
  if (!match) {
    throw new Error('Invalid Google Sheets response format');
  }
  return JSON.parse(match[1]);
}

function normalizeString(value) {
  return String(value || '').trim().normalize('NFC').toLowerCase();
}

function columnLetterToIndex(letter) {
  if (!letter) return -1;
  const normalized = String(letter).trim().toUpperCase();
  let index = 0;
  for (let i = 0; i < normalized.length; i += 1) {
    const charCode = normalized.charCodeAt(i);
    if (charCode < 65 || charCode > 90) {
      return -1;
    }
    index = index * 26 + (charCode - 65 + 1);
  }
  return index - 1;
}

function findSheetCell(table, headerLabel, fallbackColumn) {
  if (!table || !Array.isArray(table.cols)) {
    return -1;
  }

  // Prioritize column letter if provided
  if (fallbackColumn) {
    const fallbackIndex = columnLetterToIndex(fallbackColumn);
    if (fallbackIndex >= 0 && fallbackIndex < table.cols.length) {
      return fallbackIndex;
    }
  }

  // Fall back to header matching
  if (headerLabel) {
    const label = normalizeString(headerLabel);
    return table.cols.findIndex(col => normalizeString(col.label || col.id || '') === label);
  }

  return -1;
}

function getValueFromRow(row, index) {
  if (!row || !Array.isArray(row.c) || index < 0) {
    return null;
  }
  const cell = row.c[index];
  if (!cell) {
    return null;
  }
  return cell.v != null ? cell.v : (cell.f != null ? cell.f : null);
}

function findRowByKey(table, keyHeader, keyValue) {
  if (!Array.isArray(table.rows) || table.rows.length === 0) {
    return null;
  }
  if (keyHeader && keyValue) {
    const keyIndex = findSheetCell(table, keyHeader);
    if (keyIndex >= 0) {
      const found = table.rows.find(row => {
        const cellValue = getValueFromRow(row, keyIndex);
        return normalizeString(cellValue) === normalizeString(keyValue);
      });
      if (found) {
        return found;
      }
    }
  }
  return table.rows[0] || null;
}

function parseSheetPercentage(value) {
  if (value == null) {
    return null;
  }

  if (typeof value === 'number') {
    const pct = Math.abs(value) <= 1 ? value * 100 : value;
    return Math.round(pct);
  }

  const str = String(value).trim();
  const percentMatch = str.match(/^(-?\d+(?:[\.,]\d+)?)\s*%$/);
  if (percentMatch) {
    return Math.round(Number(percentMatch[1].replace(',', '.')));
  }

  const numericMatch = str.replace(/\s+/g, '').replace(',', '.').match(/(-?\d+(?:\.\d+)?)/);
  if (!numericMatch) {
    return null;
  }
  const numeric = Number(numericMatch[1]);
  const pct = numeric <= 1 ? numeric * 100 : numeric;
  return Math.round(pct);
}

function parseSheetDate(value) {
  if (value == null) {
    return null;
  }

  // Handle Google Sheets date format like "Date(2026,3,14)"
  const dateMatch = String(value).match(/Date\((\d+),(\d+),(\d+)\)/);
  if (dateMatch) {
    const year = parseInt(dateMatch[1]);
    const month = parseInt(dateMatch[2]); // 0-based in JS Date
    const day = parseInt(dateMatch[3]);
    const date = new Date(year, month, day);
    return date;
  }

  // Try to parse as regular date string
  const date = new Date(String(value));
  if (!isNaN(date.getTime())) {
    return date;
  }

  return null;
}

function formatSheetDate(value) {
  const date = parseSheetDate(value);
  if (!date) {
    return String(value);
  }
  return date.toLocaleDateString('pt-PT', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function getDaysDiff(dateValue1, dateValue2) {
  const date1 = parseSheetDate(dateValue1);
  const date2 = parseSheetDate(dateValue2);
  
  if (!date1 || !date2) {
    return null;
  }

  // Reset time to midnight for accurate day difference
  date1.setHours(0, 0, 0, 0);
  date2.setHours(0, 0, 0, 0);

  return Math.floor((date2 - date1) / (1000 * 60 * 60 * 24));
}

async function fetchSheetTable(config) {
  const endpoint = getSheetEndpoint(config);
  const response = await fetch(endpoint, { cache: 'no-cache' });
  if (!response.ok) {
    throw new Error(`Sheet fetch failed: ${response.status} ${response.statusText}`);
  }
  const text = await response.text();
  const json = parseGvizResponse(text);
  if (!json || !json.table) {
    throw new Error('Sheet response did not contain table data');
  }
  return json.table;
}

function buildRowLookup(table, row) {
  const valuesByHeader = {};
  const valuesByColumn = {};

  if (!row || !Array.isArray(table.cols)) {
    return { valuesByHeader, valuesByColumn };
  }

  table.cols.forEach((col, index) => {
    const value = getValueFromRow(row, index);
    valuesByColumn[index] = value;

    const normalizedLabel = normalizeString(col.label || col.id || `col${index}`);
    valuesByHeader[normalizedLabel] = value;
  });

  return { valuesByHeader, valuesByColumn };
}

async function loadSheetDataCached(config = {}, options = {}) {
  const cfg = Object.assign({}, SHEET_CONFIG_DEFAULT, config);
  const cacheKey = getCacheKey(cfg);
  const forceReload = options.forceReload === true;

  if (!forceReload && sheetCache[cacheKey]) {
    return sheetCache[cacheKey];
  }

  if (!forceReload && sheetCachePromises[cacheKey]) {
    return await sheetCachePromises[cacheKey];
  }

  const promise = (async () => {
    const table = await fetchSheetTable(cfg);
    const row = findRowByKey(table, cfg.keyHeader, cfg.keyValue);
    if (!row) {
      throw new Error('No data row found in sheet');
    }

    const lookup = buildRowLookup(table, row);
    const result = { table, row, valuesByHeader: lookup.valuesByHeader, valuesByColumn: lookup.valuesByColumn };

    sheetCache[cacheKey] = result;
    delete sheetCachePromises[cacheKey];
    return result;
  })();

  sheetCachePromises[cacheKey] = promise;
  try {
    return await promise;
  } catch (error) {
    delete sheetCachePromises[cacheKey];
    throw error;
  }
}

async function loadSheetRow(config = {}) {
  const cached = await loadSheetDataCached(config);
  return cached;
}

function getSheetRowValue(rowData, targetHeader, targetColumn) {
  if (!rowData) {
    return null;
  }

  if (targetHeader) {
    const normalizedHeader = normalizeString(targetHeader);
    if (Object.prototype.hasOwnProperty.call(rowData.valuesByHeader, normalizedHeader)) {
      return rowData.valuesByHeader[normalizedHeader];
    }
  }

  if (targetColumn) {
    const index = columnLetterToIndex(targetColumn);
    if (index >= 0) {
      return rowData.valuesByColumn[index];
    }
  }

  return null;
}

async function loadSheetValue(config = {}) {
  const cfg = Object.assign({}, SHEET_CONFIG_DEFAULT, config);
  const cached = await loadSheetDataCached(cfg);

  return getSheetRowValue(cached, cfg.targetHeader, cfg.targetColumn);
}

function rowValuesSnapshot(rowData) {
  if (!rowData || !rowData.valuesByHeader) {
    return '';
  }
  const entries = Object.entries(rowData.valuesByHeader).sort(([a], [b]) => a.localeCompare(b));
  return JSON.stringify(entries);
}

// Watcher genérico de um separador inteiro: re-fetcha periodicamente e chama
// onChange sempre que o conteúdo da tabela mudar (snapshot por hash das células).
function watchSheetTab(config = {}, onChange, intervalMs = 20000) {
  const cfg = Object.assign({}, SHEET_CONFIG_DEFAULT, config);
  let lastSnapshot = null;
  let stopped = false;

  function tableSnapshot(table) {
    if (!table || !Array.isArray(table.rows)) return '';
    // Concatena valores brutos de todas as linhas/colunas
    const parts = [];
    for (let i = 0; i < table.rows.length; i += 1) {
      const row = table.rows[i];
      if (!row || !Array.isArray(row.c)) { parts.push(''); continue; }
      for (let j = 0; j < row.c.length; j += 1) {
        const cell = row.c[j];
        parts.push(cell ? (cell.v != null ? String(cell.v) : (cell.f != null ? String(cell.f) : '')) : '');
      }
      parts.push('|');
    }
    return parts.join(',');
  }

  async function check() {
    if (stopped) return;
    try {
      const table = await fetchSheetTable(cfg);
      const snapshot = tableSnapshot(table);
      if (snapshot !== lastSnapshot) {
        lastSnapshot = snapshot;
        onChange();
      }
    } catch (error) {
      console.warn(`Sheet watch error (${cfg.tab}):`, error);
    }
  }

  check();
  const intervalId = setInterval(check, intervalMs);
  return () => {
    stopped = true;
    clearInterval(intervalId);
  };
}

function watchSheetRow(config = {}, onChange, intervalMs = 20000) {
  let lastSnapshot = null;
  let stopped = false;

  async function check() {
    if (stopped) return;
    try {
      const cached = await loadSheetDataCached(config, { forceReload: true });
      const snapshot = rowValuesSnapshot(cached);
      if (snapshot !== lastSnapshot) {
        lastSnapshot = snapshot;
        onChange(cached);
      }
    } catch (error) {
      console.warn('Sheet watch error:', error);
    }
  }

  check();
  const intervalId = setInterval(check, intervalMs);
  return () => {
    stopped = true;
    clearInterval(intervalId);
  };
}

/**
 * Calcula dias úteis (segunda a sexta) entre duas datas em Portugal
 * @param {Date|String|Number} startDate - Data inicial
 * @param {Date|String|Number} endDate - Data final
 * @param {Boolean} includeStartDay - Se inclui o primeiro dia (padrão: true)
 * @param {Number} year - Ano para determinar feriados (padrão: ano da startDate)
 * @returns {Number} Número de dias úteis
 */
function getWorkDaysCount(startDate, endDate, includeStartDay = true, year = null) {
  const start = parseSheetDate(startDate);
  const end = parseSheetDate(endDate);
  
  if (!start || !end) {
    return null;
  }

  // Feriados nacionais em Portugal (formato: MM-DD)
  const ptHolidays = [
    '01-01', // Ano Novo
    '04-25', // Dia da Liberdade
    '05-01', // Dia do Trabalho
    '06-10', // Dia de Portugal
    '08-15', // Assunção
    '10-05', // Proclamação da República
    '11-01', // Dia de Todos os Santos
    '12-01', // Restauração da Independência
    '12-25', // Natal
  ];

  // Feriados móveis para 2026
  const mobileHolidays2026 = [
    '02-17', // Terça de Carnaval
    '04-17', // Sexta-feira Santa
  ];

  const year4Start = start.getFullYear();
  if (year === year4Start) {
    ptHolidays.push(...mobileHolidays2026);
  }

  const isHoliday = (date) => {
    const monthDay = String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
    return ptHolidays.includes(monthDay);
  };

  const isWorkDay = (date) => {
    const dayOfWeek = date.getDay();
    // 0 = domingo, 1 = segunda, ..., 5 = sexta, 6 = sábado
    return dayOfWeek >= 1 && dayOfWeek <= 5 && !isHoliday(date);
  };

  let count = 0;
  const current = new Date(start);
  current.setHours(0, 0, 0, 0);
  end.setHours(0, 0, 0, 0);

  // Ajestar se não inclui o dia de início
  if (!includeStartDay) {
    current.setDate(current.getDate() + 1);
  }

  while (current <= end) {
    if (isWorkDay(current)) {
      count++;
    }
    current.setDate(current.getDate() + 1);
  }

  return count;
}

/**
 * Retorna informações de prazo com dias úteis
 * @param {Date|String|Number} startDate - Data de início
 * @param {Date|String|Number} dueDate - Data prevista
 * @param {Date|String|Number} todayDate - Data atual (padrão: hoje)
 * @returns {Object} { totalWorkDays, remainingWorkDays, percentage }
 */
function getDeadlineInfo(startDate, dueDate, todayDate = new Date()) {
  const start = parseSheetDate(startDate);
  const due = parseSheetDate(dueDate);
  const today = parseSheetDate(todayDate);
  
  if (!start || !due || !today) {
    return null;
  }

  const totalWorkDays = getWorkDaysCount(start, due, true, start.getFullYear());
  const remainingWorkDays = getWorkDaysCount(today, due, false, today.getFullYear());
  
  return {
    totalWorkDays,
    remainingWorkDays,
    daysElapsed: totalWorkDays - remainingWorkDays,
    percentage: totalWorkDays > 0 ? Math.round(((totalWorkDays - remainingWorkDays) / totalWorkDays) * 100) : 0
  };
}

// campos pedidos como { [chave]: valor }. Cada campo é { header, column }.
// Faz de-dupe se já existe um fetch em curso para o mesmo separador.
async function fetchSecondaryRowFields(tab, fields) {
  if (!SECONDARY_TAB_INFLIGHT[tab]) {
    SECONDARY_TAB_INFLIGHT[tab] = fetchSheetTable({ id: SHEET_CONFIG_DEFAULT.id, tab })
      .finally(() => { delete SECONDARY_TAB_INFLIGHT[tab]; });
  }
  const table = await SECONDARY_TAB_INFLIGHT[tab];
  const out = {};
  if (!table || !Array.isArray(table.rows) || !table.rows[0]) {
    return out;
  }
  const firstRow = table.rows[0];
  Object.keys(fields).forEach(key => {
    const { header, column } = fields[key];
    const idx = findSheetCell(table, header, column);
    out[key] = idx >= 0 ? getValueFromRow(firstRow, idx) : null;
  });
  return out;
}

// Lê valores de várias colunas em várias linhas de um separador.
// `columns` é um objecto { chave: { header, column } } a definir as colunas pretendidas.
// `startRow`/`endRow` são números de linha 1-indexed da Sheet (linha 1 = cabeçalho).
// Devolve um array de objectos, um por linha de dados, com as chaves pedidas.
//
// Nota técnica: o gviz com headers=1 desloca os índices — a linha 2 da Sheet
// corresponde a rows[0], a linha 3 a rows[1], etc. Esta função abstrai isso.
async function fetchSecondaryRowsRange(tab, columns, startRow, endRow) {
  if (!SECONDARY_TAB_INFLIGHT[tab]) {
    SECONDARY_TAB_INFLIGHT[tab] = fetchSheetTable({ id: SHEET_CONFIG_DEFAULT.id, tab })
      .finally(() => { delete SECONDARY_TAB_INFLIGHT[tab]; });
  }
  const table = await SECONDARY_TAB_INFLIGHT[tab];
  if (!table || !Array.isArray(table.rows)) return [];

  // Resolver o índice de cada coluna uma vez
  const resolved = {};
  Object.keys(columns).forEach(key => {
    const { header, column } = columns[key];
    resolved[key] = findSheetCell(table, header, column);
  });

  // Linha N (1-indexed) da Sheet → rows[N-2] no gviz (porque rows[0] = linha 2)
  const startIdx = Math.max(0, startRow - 2);
  const endIdx = Math.min(table.rows.length - 1, endRow - 2);

  const out = [];
  for (let i = startIdx; i <= endIdx; i += 1) {
    const row = table.rows[i];
    if (!row) continue;
    const obj = {};
    Object.keys(resolved).forEach(key => {
      const idx = resolved[key];
      obj[key] = idx >= 0 ? getValueFromRow(row, idx) : null;
    });
    out.push(obj);
  }
  return out;
}

    }
    const ignore = new Set((source.ignoreLabels || []).map(s => String(s).trim()));
    const firstRow = table.rows[0]; // linha 2 da Sheet (gviz com headers=1 desloca)
    const limit = Math.max(1, source.limit || 50);
    const values = [];
    for (let i = startIdx; i <= endIdx && i < table.cols.length && values.length < limit; i += 1) {
      const value = getValueFromRow(firstRow, i);
      if (value == null || String(value).trim() === '') continue;

      const col = table.cols[i] || {};
      const rawLabel = col.label != null && String(col.label).trim() !== ''
        ? String(col.label).trim()
        : String(col.id || '').trim();
      if (rawLabel === '' || ignore.has(rawLabel)) continue;

      values.push(rawLabel);
    }
    return values;
  }

  // Modo default: percorre as primeiras linhas de uma única coluna
  const colIndex = findSheetCell(table, source.header, source.column);
  if (colIndex < 0 || !Array.isArray(table.rows)) {
    return [];
  }
  const limit = Math.max(1, source.limit || 5);
  const values = [];
  for (let i = 0; i < table.rows.length && values.length < limit; i += 1) {
    const v = getValueFromRow(table.rows[i], colIndex);
    if (v != null && String(v).trim() !== '') {
      values.push(String(v).trim());
    }
  }
  return values;
}

function buildZonaPctCard(config, rowData) {
  // Suporta dois modos:
  //   1) rowData é a linha completa do PM1 → vai buscar via getFieldValue
  //   2) rowData = { __raw: valor } → usa o valor directamente (cards lidos de separadores externos)
  let raw;
  if (rowData && Object.prototype.hasOwnProperty.call(rowData, '__raw')) {
    raw = rowData.__raw;
  } else {
    raw = getFieldValue(rowData, config.header, config.column, 0);
  }
  const pct = parseSheetPercentage(raw) || 0;
  const cls = pct === 100 ? 'done' : pct > 0 ? 'going' : 'empty';
  const col = bc(pct);
  const card = document.createElement('div');
  card.className = `zona-card ${cls}${config.tall ? ' tall' : ''}`;
  card.innerHTML = `
    <div class="zona-card-label">${escapeHtml(config.nome)}</div>
    <div class="zona-card-pct" style="color:${col || 'rgba(255,255,255,0.15)'}">${pct}%</div>
    <div class="zona-card-bar">
      <div class="zona-card-fill" style="width:${pct}%;background:${col || 'rgba(255,255,255,0.07)'}"></div>
    </div>`;
  return card;
}

function buildZonaListCard(config, items) {
  const list = Array.isArray(items) ? items : [];
  const cls = list.length > 0 ? 'going' : 'empty';
  const card = document.createElement('div');
  card.className = `zona-card list ${cls}${config.tall ? ' tall' : ''}`;

  const itemsHtml = list.length
    ? list.map(v => `<div class="zona-card-list-item">${escapeHtml(v)}</div>`).join('')
    : '<div class="zona-card-list-empty">Sem dados</div>';

  const src = config.listSource || {};
  const headerLabel = src.headerLabel || src.header || 'LOTE';
  const headerHtml = src.hideHeader
    ? ''
    : `<div class="zona-card-list-header">${escapeHtml(headerLabel)}</div>`;

  card.innerHTML = `
    <div class="zona-card-label">${escapeHtml(config.nome)}</div>
    ${headerHtml}
    <div class="zona-card-list-items">${itemsHtml}</div>`;
  return card;
}

function buildZonaSingleCard(config, value) {
  const txt = value != null && String(value).trim() !== '' ? String(value).trim() : null;
  const cls = txt ? 'going' : 'empty';
  const card = document.createElement('div');
  card.className = `zona-card single ${cls}${config.tall ? ' tall' : ''}`;
  card.innerHTML = `
    <div class="zona-card-label">${escapeHtml(config.nome)}</div>
    <div class="zona-card-single-value">${escapeHtml(txt || '—')}</div>`;

}

function renderZones(rowData) {
  zg.innerHTML = '';
  ZONA_CONFIGS.forEach(config => {
    if (config.type === 'list') {
      const src = config.listSource || {};
      const cacheKey = src.mode === 'row-headers'
        ? `list|${src.tab}|rowheaders|${src.startColumn}-${src.endColumn}`
        : `list|${src.tab}|${src.column || src.header}`;
      const cached = ZONA_LIST_CACHE[cacheKey];
      const card = buildZonaListCard(config, cached);
      zg.appendChild(card);

      fetchZonaListValues(src)
        .then(values => {
          ZONA_LIST_CACHE[cacheKey] = values;
          const fresh = buildZonaListCard(config, values);
          card.replaceWith(fresh);
        })
        .catch(err => console.warn(`Falha a carregar lista para "${config.nome}":`, err));
    } else if (config.type === 'single') {
      const src = config.singleSource || {};
      const cacheKey = `single|${src.tab}|${src.column || src.header}`;
      const cached = ZONA_LIST_CACHE[cacheKey];
      const card = buildZonaSingleCard(config, cached);
      zg.appendChild(card);

      fetchSecondaryRowFields(src.tab, {
        v: { header: src.header, column: src.column },
      }).then(({ v }) => {
        ZONA_LIST_CACHE[cacheKey] = v;
        const fresh = buildZonaSingleCard(config, v);
        card.replaceWith(fresh);
      }).catch(err => console.warn(`Falha a carregar valor para "${config.nome}":`, err));
    } else if (config.tab) {
      // Card percentual lido de um separador específico (ex: PS1)
      const cacheKey = `pct|${config.tab}|${config.column || config.header}`;
      const cached = ZONA_LIST_CACHE[cacheKey];
      // Render imediato com o que está em cache (evita pisca)
      const card = buildZonaPctCard(config, cached != null ? { __raw: cached } : null);
      zg.appendChild(card);

      fetchSecondaryRowFields(config.tab, {
        v: { header: config.header, column: config.column },
      }).then(({ v }) => {
        ZONA_LIST_CACHE[cacheKey] = v;
        // Constrói card fresco com o valor recebido
        const fresh = buildZonaPctCard(config, { __raw: v });
        card.replaceWith(fresh);
      }).catch(err => console.warn(`Falha a carregar pct para "${config.nome}":`, err));
    } else {
      zg.appendChild(buildZonaPctCard(config, rowData));
    }
  });
}

function updateDeadline(startValue, dueValue) {
  // Helper: limpa o bloco de prazo para o estado "sem dados"
  const clearDeadline = () => {
    const dash = '-';
    if (prazoUsedEl) {
      prazoUsedEl.textContent = dash;
      prazoUsedEl.style.color = 'rgba(255,255,255,0.4)';
      prazoUsedEl.style.textShadow = 'none';
    }
    if (prazoTotalEl) {
      prazoTotalEl.textContent = dash;
    }
    const unitEl = document.querySelector('.prazo-unit');
    if (unitEl) {
      unitEl.textContent = 'DIAS';
    }
    if (prazoBarEl) {
      prazoBarEl.style.width = '0%';
      prazoBarEl.style.background = 'rgba(255,255,255,0.15)';
    }
    if (folgaEl) {
      folgaEl.textContent = '—';
      folgaEl.style.color = 'rgba(255,255,255,0.4)';
    }
  };

  if (startValue == null || String(startValue).trim() === '' ||
      dueValue == null || String(dueValue).trim() === '') {
    clearDeadline();
    return;
  }

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const total = getWorkDaysCount(startValue, dueValue, true);
  const used = getWorkDaysCount(startValue, today, true);
  const remaining = getWorkDaysCount(today, dueValue, false);

  if (total == null || used == null || remaining == null) {
    clearDeadline();
    return;
  }

  const ratio = total > 0 ? Math.min(1, used / total) : 0;
  const pc = ratio >= .9 ? '#ff3b3b' : ratio >= .7 ? '#ffaa00' : '#00ff87';

  if (prazoUsedEl) {
    prazoUsedEl.textContent = used;
    prazoUsedEl.style.color = pc;
    prazoUsedEl.style.textShadow = `0 0 40px ${pc}50`;
  }
  if (prazoBarEl) {
    prazoBarEl.style.width = `${ratio * 100}%`;
    prazoBarEl.style.background = pc;
  }
  if (folgaEl) {
    folgaEl.textContent = `${remaining} dias restantes`;
    folgaEl.style.color = remaining <= 1 ? '#ff3b3b' : remaining <= 3 ? '#ffaa00' : '#00ff87';
  }
  if (prazoTotalEl) {
    prazoTotalEl.textContent = total;
  }
  const unitEl = document.querySelector('.prazo-unit');
  if (unitEl) {
    unitEl.textContent = 'dias';
  }
}

function loadAndRenderPaises() {
  return fetchSecondaryRowsRange('montagemEditável', {
    pais: { header: 'PAÍS', column: 'L' },
    idioma: { header: 'IDIOMA', column: 'M' },
  }, 2, 5).then(rows => {
    const valid = rows
      .map(r => ({
        pais: r.pais != null ? String(r.pais).trim() : '',
        idioma: r.idioma != null ? String(r.idioma).trim() : '',
      }))
      .filter(r => r.pais !== '');

    if (valid.length === 0) {
      setPaisEmpty();
      if (typeof updateGlobeDestinations === 'function') {
        updateGlobeDestinations([]);
      }
      return;
    }

    // Ordenação alfabética pelo nome do país (locale PT, insensível a acentos/maiúsculas)
    valid.sort((a, b) => a.pais.localeCompare(b.pais, 'pt', { sensitivity: 'base' }));

    if (valid.length === 1) {
      setPaisSingle(valid[0].pais, valid[0].idioma);
    } else {
      setPaisGrid(valid);
    }

    // Marcar todos os países no globo (Portugal mantém-se sempre como origem)
    if (typeof updateGlobeDestinations === 'function') {
      updateGlobeDestinations(valid.map(r => r.pais));
    }
  }).catch(err => {
    console.warn('Falha a carregar países do montagemEditável:', err);
    setPaisEmpty();
    if (typeof updateGlobeDestinations === 'function') {
      updateGlobeDestinations([]);
    }
  });
}

function renderSheetData(sheetRow) {
  if (!sheetRow) return;

  // Modelo e Lote vêm do PS1!D (mais abaixo, no fetch ao PS1)
  // Evolução Global vem do PS1!AK (também no fetch ao PS1)
  // Países vêm de montagemEditável (refrescados pelo seu próprio watcher — ver loadAndRenderPaises)
  loadAndRenderPaises();

  // Datas + Modelo/Lote vindos do PS1
  const DATE_PLACEHOLDER = '-- / -- / ----';
  const MODEL_PLACEHOLDER = '—';

  // Atualiza o badge "Prioridade Ativa" no canto superior esquerdo
  const ativaBox = document.getElementById('prioridadeAtiva');
  const ativaValueEl = document.getElementById('prioridadeAtivaValue');
  function setPrioridadeAtiva(value) {
    const txt = value != null && String(value).trim() !== '' ? String(value).trim() : null;
    if (ativaValueEl) ativaValueEl.textContent = txt || '—';
    if (ativaBox) ativaBox.classList.toggle('is-empty', !txt);
  }

  // Separa "MWS500 SDS - 87L" → { modelo: "MWS500 SDS", lote: "87L" }.
  // Se não terminar em "<2 dígitos>L", devolve { modelo: <string toda>, lote: null }.
  function parseModeloLote(raw) {
    const text = raw == null ? '' : String(raw).trim();
    if (text === '') return { modelo: '', lote: null };
    // Padrão: começa pela parte do modelo, segue " - " (espaços flexíveis), 2 dígitos + L no fim
    const m = text.match(/^(.*?)\s*-\s*(\d{2}L)$/);
    if (m) {
      return { modelo: m[1].trim(), lote: m[2] };
    }
    return { modelo: text, lote: null };
  }

  fetchSecondaryRowFields('PS1', {
    inicio: { header: 'INÍCIO SOLDADURA / ACABAMENTO', column: 'J' },
    previsto: { header: 'DATA PRETENDIDA', column: 'F' },
    modeloLote: { header: 'D', column: 'D' },
    prioridadeAtiva: { header: 'Posto 1', column: 'CI' },
    geral: { header: 'GERAL', column: 'AK' },
    chaveProcura: { header: 'Chave de Procura', column: 'A' },
  }).then(({ inicio, previsto, modeloLote, prioridadeAtiva, geral, chaveProcura }) => {
    const inicioFmt = inicio != null && String(inicio).trim() !== ''
      ? formatSheetDate(inicio) || DATE_PLACEHOLDER
      : DATE_PLACEHOLDER;
    const previstoFmt = previsto != null && String(previsto).trim() !== ''
      ? formatSheetDate(previsto) || DATE_PLACEHOLDER
      : DATE_PLACEHOLDER;
    renderText(dataInicioEl, inicioFmt, DATE_PLACEHOLDER);
    renderText(dataPrevistaEl, previstoFmt, DATE_PLACEHOLDER);
    updateDeadline(inicio, previsto);

    const { modelo, lote } = parseModeloLote(modeloLote);
    renderText(modelEl, modelo || MODEL_PLACEHOLDER, MODEL_PLACEHOLDER);
    if (loteEl) {
      loteEl.innerHTML = lote
        ? `Lote &nbsp;·&nbsp; ${escapeHtml(lote)}`
        : 'Sem Lote';
    }

    setPrioridadeAtiva(prioridadeAtiva);
    updateStatus(chaveProcura);
    const geralPct = parseSheetPercentage(geral);
    if (geralPct == null) {
      console.warn('[evolução] valor de GERAL (PS1!AK2) não parseável:', geral);
    } else {
      console.log('[evolução] GERAL (PS1!AK2) =', geral, '→', geralPct, '%');
    }
    updateEvolucao(geralPct != null ? geralPct : 0);
  }).catch(err => {
    console.warn('Falha a carregar dados do PS1:', err);
    renderText(dataInicioEl, DATE_PLACEHOLDER, DATE_PLACEHOLDER);
    renderText(dataPrevistaEl, DATE_PLACEHOLDER, DATE_PLACEHOLDER);
    updateDeadline(null, null);
    renderText(modelEl, MODEL_PLACEHOLDER, MODEL_PLACEHOLDER);
    if (loteEl) {
      loteEl.innerHTML = 'Sem Lote';
    }
    setPrioridadeAtiva(null);
    updateStatus(null);
    updateEvolucao(0);
  });

  renderZones(sheetRow);
}

function initializeSheetWatcher() {
  // Watcher principal: PS1 (fonte primária — ao mudar dispara re-render completo)
  const stopPs1 = watchSheetRow(SHEET_CONFIG, renderSheetData, SHEET_POLL_INTERVAL);

  const stopPaises = watchSheetTab(

}

(function syncRightHeights() {
  const zonas = document.querySelector('.zonas-panel');
  const prazo = document.querySelector('.prazo-section');
  const details = document.querySelector('.details-section');
  if (!zonas || !prazo || !details) return;

  // box-sizing: border-box garante que height inclui padding
  prazo.style.boxSizing = 'border-box';
  details.style.boxSizing = 'border-box';

  function applyHeight() {
    const total = zonas.getBoundingClientRect().height;
    if (total <= 0) return;
    // Split: 65% prazo / 25% details — soma 90% do zonas-panel (10% libertado)
    prazo.style.height = `${total * 0.65}px`;
    details.style.height = `${total * 0.25}px`;
  }

  // Aplica imediatamente e ao redimensionar
  applyHeight();
  window.addEventListener('resize', applyHeight);
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(applyHeight).observe(zonas);
  }
})();

/* ── THREE.JS GLOBE ── */
(function() {
  const container = document.getElementById('globeContainer');
  const W = container.offsetWidth;
  const H = container.offsetHeight;

  const scene    = new THREE.Scene();
  const camera   = new THREE.PerspectiveCamera(45, W / H, 0.1, 2000);
  camera.position.set(0, 30, 380);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.setClearColor(0x000000, 0);
  container.appendChild(renderer.domElement);

  const RADIUS = 140 * 0.96;
  const globeGroup = new THREE.Group();
  scene.add(globeGroup);

  // Luzes (afectam apenas materiais que reagem a luz — Phong/Standard/etc.
  // O globo e a atmosfera usam BasicMaterial/ShaderMaterial, ficam intactos)
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
  dirLight.position.set(120, 180, 200);
  scene.add(dirLight);
  const fillLight = new THREE.DirectionalLight(0x88aaff, 0.35);
  fillLight.position.set(-150, -80, -100);
  scene.add(fillLight);

  // ── SHADERS ──
  const globeVS = `
    varying vec3 vNormal;
    varying vec2 vUv;
    void main() {
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      vNormal = normalize(normalMatrix * normal);
      vUv = uv;
    }`;
  const globeFS = `
    uniform sampler2D globeTexture;
    varying vec3 vNormal;
    varying vec2 vUv;
    void main() {
      vec3 diffuse = texture2D(globeTexture, vUv).xyz * 0.8;
      float intensity = 1.05 - dot(vNormal, vec3(0.0,0.0,1.0));
      vec3 atmosphere = vec3(1.0,1.0,1.0) * pow(intensity, 3.0) * 0.4;
      gl_FragColor = vec4(diffuse + atmosphere, 1.04);
    }`;

  const atmVS = `
    varying vec3 vNormal;
    void main() {
      vNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }`;
  const atmFS = `
    varying vec3 vNormal;
    void main() {
      float intensity = pow(0.7 - dot(vNormal, vec3(0.0,0.0,1.0)), 4.0);
      gl_FragColor = vec4(1.0,1.0,1.0,1.0) * intensity;
    }`;

  // ── GLOBE SPHERE with texture ──
  const loader   = new THREE.TextureLoader();
  const EARTH_TX = 'https://res.cloudinary.com/djxxk3ipz/image/upload/v1776693284/WhatsApp_Image_2025-11-16_at_11.26.19_ssekf5.jpg';

  const globeGeo = new THREE.SphereGeometry(RADIUS, 64, 64);
  const globeMat = new THREE.ShaderMaterial({
    uniforms: { globeTexture: { value: null } },
    vertexShader: globeVS,
    fragmentShader: globeFS,
    blending: THREE.AdditiveBlending,
    transparent: true,
  });

  loader.load(EARTH_TX, (tex) => {
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    globeMat.uniforms.globeTexture.value = tex;
    globeMat.needsUpdate = true;
  }, undefined, () => {
    globeMat.fragmentShader = `
      varying vec3 vNormal;
      void main() {
        float i = 1.05 - dot(vNormal, vec3(0,0,1));
        vec3 atm = vec3(0.05,0.2,0.5) * pow(i,2.5);
        gl_FragColor = vec4(vec3(0.02,0.06,0.14) + atm, 0.95);
      }`;
    globeMat.needsUpdate = true;
  });

  const globeMesh = new THREE.Mesh(globeGeo, globeMat);
  globeGroup.add(globeMesh);

  // Esfera interior escura — dá densidade visual ao globo (compensa o additive blending
  // do material principal, que tende a deixar passar o fundo). Ligeiramente menor que
  // a esfera do mapa para nunca aparecer por fora.
  const innerSphereMesh = new THREE.Mesh(
    new THREE.SphereGeometry(RADIUS * 0.985, 48, 48),
    new THREE.MeshBasicMaterial({
      color: 0x020610,        // azul-marinho muito escuro, quase preto
      transparent: true,
      opacity: 0.95,
      depthWrite: true,
    })
  );
  globeGroup.add(innerSphereMesh);

  // ── ATMOSPHERE ──
  const atmMesh = new THREE.Mesh(
    new THREE.SphereGeometry(RADIUS, 64, 64),
    new THREE.ShaderMaterial({
      vertexShader: atmVS,
      fragmentShader: atmFS,
      blending: THREE.AdditiveBlending,
      side: THREE.BackSide,
      transparent: true,
    })
  );
  atmMesh.scale.set(1.2, 1.2, 1.2);
  globeGroup.add(atmMesh);

  // ── DISC TEXTURE ──
  function makeDiscTexture() {
    const c = document.createElement('canvas');
    c.width = c.height = 64;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(32,32,0,32,32,32);
    g.addColorStop(0,   'rgba(255,255,255,1)');
    g.addColorStop(0.4, 'rgba(255,255,255,0.9)');
    g.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(32,32,32,0,Math.PI*2); ctx.fill();
    const t = new THREE.CanvasTexture(c);
    return t;
  }

  // ── DOTS grid ──
  function toXYZ(lat, lon, r) {
    const phi   = (90 - lat)  * Math.PI / 180;
    const theta = (180 - lon) * Math.PI / 180;
    return new THREE.Vector3(
      -r * Math.sin(phi) * Math.cos(theta),
      -r * Math.cos(phi),
      -r * Math.sin(phi) * Math.sin(theta)
    );
  }

  function coordToPos(lat, lon, r) {
    const phi   = (90 - lat)  * Math.PI / 180;
    const theta = (180 - lon) * Math.PI / 180;
    return new THREE.Vector3(
      -r * Math.sin(phi) * Math.cos(theta),
       r * Math.cos(phi),
      -r * Math.sin(phi) * Math.sin(theta)
    );
  }

  const dotR   = RADIUS + RADIUS * 0.025;
  const posArr = [];
  for (let lat = -80; lat <= 80; lat += 5) {
    const cols = Math.round(Math.cos(lat * Math.PI / 180) * 36);
    for (let i = 0; i < cols; i++) {
      const lon = (i / cols) * 360 - 180;
      const p   = toXYZ(lat, lon, dotR);
      posArr.push(p.x, p.y, p.z);
    }
  }
  const dotGeo = new THREE.BufferGeometry();
  dotGeo.setAttribute('position', new THREE.Float32BufferAttribute(posArr, 3));
  const dotMat = new THREE.PointsMaterial({
    color: 0x05d5fa,
    size: 2.2,
    map: makeDiscTexture(),
    transparent: true,
    opacity: 0.8,
    alphaTest: 0.05,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  globeGroup.add(new THREE.Points(dotGeo, dotMat));

  // ── MARKERS ──
  function addMarker(lat, lon, color) {
    const pos  = coordToPos(lat, lon, RADIUS + 3);
    const group = new THREE.Group();
    group.position.copy(pos);

    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(3.5, 12, 12),
      new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.95 })
    );
    group.add(mesh);

    const ring = new THREE.Mesh(
      new THREE.RingGeometry(5, 7.5, 24),
      new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.5, side: THREE.DoubleSide })
    );
    ring.lookAt(new THREE.Vector3(0,0,0));
    group.add(ring);

    globeGroup.add(group);
    return group;
  }

  // Cria a geometria de um pushpin 3D (esfera + haste cilíndrica + ponta cónica).
  // Construído com a ponta na origem, esfera ao longo de +Y. Cacheado por chave de cor.
  const PUSHPIN_CACHE = {};
  function getPushpin(headColor, shaftColor) {
    const key = `${headColor}|${shaftColor}`;
    if (PUSHPIN_CACHE[key]) return PUSHPIN_CACHE[key].clone();

    // Dimensões (proporcionais — pin discreto). RADIUS≈134, então mantemos pequeno.
    const headR = 4.5;
    const shaftLen = 9;
    const shaftR = 0.7;
    const tipLen = 1.8;

    const group = new THREE.Group();

    // Ponta (cone) — na origem, a apontar para -Y
    const tipGeo = new THREE.ConeGeometry(shaftR, tipLen, 12);
    const tipMesh = new THREE.Mesh(tipGeo, new THREE.MeshPhongMaterial({
      color: shaftColor, shininess: 80, specular: 0x666666,
    }));
    // ConeGeometry tem ponta em +Y por defeito; queremos ponta em -Y
    tipMesh.rotation.x = Math.PI;
    tipMesh.position.y = tipLen / 2;
    group.add(tipMesh);

    // Haste (cilindro)
    const shaftGeo = new THREE.CylinderGeometry(shaftR, shaftR, shaftLen, 16);
    const shaftMesh = new THREE.Mesh(shaftGeo, new THREE.MeshPhongMaterial({
      color: shaftColor, shininess: 80, specular: 0x666666,
    }));
    shaftMesh.position.y = tipLen + shaftLen / 2;
    group.add(shaftMesh);

    // Esfera (cabeça)
    const headGeo = new THREE.SphereGeometry(headR, 24, 18);
    const headMesh = new THREE.Mesh(headGeo, new THREE.MeshPhongMaterial({
      color: headColor, shininess: 50, specular: 0x222222,
    }));
    headMesh.position.y = tipLen + shaftLen + headR * 0.85; // ligeira sobreposição com a haste
    group.add(headMesh);

    PUSHPIN_CACHE[key] = group;
    return group.clone();
  }

  // Marcador em forma de pushpin 3D. A ponta fica nas coords (lat, lon)
  // e o pin orienta-se radialmente para fora (cabeça para o céu, ponta no globo).
  function add3DPinMarker(lat, lon, headColor, shaftColor) {
    const tipPos = coordToPos(lat, lon, RADIUS + 0.2);
    const outwardDir = tipPos.clone().normalize();

    const pin = getPushpin(headColor, shaftColor || '#cfd2d6');

    pin.position.copy(tipPos);
    const upLocal = new THREE.Vector3(0, 1, 0);
    pin.quaternion.setFromUnitVectors(upLocal, outwardDir);

    pin.renderOrder = 999;
    globeGroup.add(pin);
    return pin;
  }
  // Marcadores iniciais — Portugal como pushpin (esfera branca, haste cinzenta)
  let ptRing = add3DPinMarker(38.7, -9.1, '#ffffff', '#b8bcc2');
  let destRings = [];

  // Atualiza marcadores de destino. Aceita uma lista de nomes de países (ou um único string,
  // por compatibilidade com a API antiga). Países repetidos são ignorados.
  function updateGlobeDestinations(countries) {
    const list = Array.isArray(countries) ? countries : (countries ? [countries] : []);

    // Remover marcadores antigos
    destRings.forEach(g => globeGroup.remove(g));
    destRings = [];

    // Deduplicar (case-insensitive, ignorando acentos)
    const seen = new Set();
    list.forEach(name => {
      if (!name) return;
      const key = String(name).trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      if (key === '' || seen.has(key)) return;
      seen.add(key);
      const coords = getCountryCoordinates(name);
      if (!coords) return;
      destRings.push(addMarker(coords.lat, coords.lon, 0x00ff87));
    });
  }
  // Wrapper de compatibilidade — código antigo ainda chama updateGlobeDestination(country)
  function updateGlobeDestination(country) {
    updateGlobeDestinations(country);
  }
  window.updateGlobeDestinations = updateGlobeDestinations;
  window.updateGlobeDestination = updateGlobeDestination;

  // O destino do globo será atualizado a partir de renderSheetData()

  globeGroup.rotation.y = THREE.MathUtils.degToRad(-(180 - 9.1));
  globeGroup.rotation.x = THREE.MathUtils.degToRad(20);

  let isRotating    = false;
  let rotStart      = 0;
  let rotStartAngle = 0;
  const ROT_DUR     = 8000;

  setInterval(() => {
    if (isRotating) return;
    isRotating    = true;
    rotStart      = Date.now();
    rotStartAngle = globeGroup.rotation.y;
  }, 5 * 60 * 1000);

  let t = 0;
  function animate() {
    requestAnimationFrame(animate);
    t += 0.008;

    const p = 0.88 + 0.18 * Math.sin(t * 3);
    // Pin de Portugal (3D) sem animação — só os marcadores de destino pulsam
    destRings.forEach(r => r.scale.set(p, p, 1));

    if (!isRotating) globeGroup.rotation.y -= 0.0015;

    if (isRotating) {
      const elapsed  = Date.now() - rotStart;
      const progress = Math.min(elapsed / ROT_DUR, 1);
      const ease     = progress < 0.5 ? 2*progress*progress : -1+(4-2*progress)*progress;
      globeGroup.rotation.y = rotStartAngle + ease * Math.PI * 2;
      if (progress >= 1) { globeGroup.rotation.y = rotStartAngle; isRotating = false; }
    }

    renderer.render(scene, camera);
  }
  animate();

  // Resize com ResizeObserver — mais robusto do que window.resize
  // (dispara também quando o layout do grid muda, não só quando a janela muda)
  const ro = new ResizeObserver(() => {
    const W2 = container.offsetWidth, H2 = container.offsetHeight;
    if (W2 === 0 || H2 === 0) return;
    camera.aspect = W2 / H2;
    camera.updateProjectionMatrix();
    renderer.setSize(W2, H2);
  });
  ro.observe(container);
})();
</script>
</body>
</html>
